name: Release (build & publish)

# Builds the universal macOS bundle for a tag and uploads it to that tag's GitHub
# Release, then publishes the npm packages. It runs two ways:
#
#   1. Called by release-please.yml when a release PR is merged (final release).
#      release-please created the Release as a DRAFT (no public "Latest", and a
#      draft has NO git tag yet), so we build from the merge `sha` it passes us,
#      upload the binaries into the draft, and only THEN publish it (the last
#      step un-drafts it, which is the moment GitHub creates the tag + Latest
#      badge). This closes the window where a "Latest" release exists with no
#      installable .dmg.
#   2. Triggered directly by pushing a `vX.Y.Z-rc.N` tag by hand (release
#      candidate). No release exists yet, so tauri-action creates one, flagged as
#      a pre-release. RC tags do NOT touch the changelog or npm — they're throwaway
#      test builds. No `sha`/`draft` inputs → we build from the tag (it exists) and
#      never draft.
#
# A tag with a `-` suffix is treated as a pre-release (not marked "latest", npm
# publish skipped).

on:
  workflow_call:
    inputs:
      tag:
        description: The vX.Y.Z tag to build and publish.
        required: true
        type: string
      sha:
        description: >-
          Commit to build from. Required when `draft` is true, because a draft
          release has no tag ref yet — we cannot `checkout` the tag, so we
          checkout this SHA instead. Omitted on the rc-tag push path.
        required: false
        type: string
      draft:
        description: >-
          When true the Release stays a draft through the build and is published
          (un-drafted) only after the binaries are attached.
        required: false
        type: boolean
        default: false
      release_id:
        description: >-
          The id of the existing (draft) GitHub Release to upload into. Required on
          the draft path: tauri-action otherwise locates the release by tag, and the
          get-release-by-tag API does not return drafts — so it would create a second,
          duplicate release. Uploading by id targets release-please's draft directly.
          Omitted on the rc-tag push path (tauri-action creates the release by tag).
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
      ref: ${{ steps.v.outputs.ref }}
      draft: ${{ inputs.draft || false }}
    steps:
      - id: v
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          # What to checkout: the passed SHA when building a draft (its tag does
          # not exist yet), otherwise the tag itself (rc push / non-draft call).
          REF="${{ inputs.sha }}"
          [ -z "$REF" ] && REF="$TAG"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          # Semver pre-release = a `-` suffix (v1.0.0-rc.1).
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: macos-14 # Apple-silicon runner; cross-compiles a universal binary
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Hard gate: never publish a build whose permission/security tests fail.
      - name: Frontend tests (gateway permissions)
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Rust tests (URL tiers + id confinement)
        working-directory: src-tauri
        run: cargo test

      - name: Build & upload macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing & notarization ---
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # --- Updater signing (emits latest.json + signature) ---
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Final path: releaseId targets release-please's existing draft directly
          # (uploading by tag would miss the draft and create a duplicate release).
          # rc path: releaseId is empty, so tauri-action creates the release by tag.
          # releaseBody is left unset so release-please's changelog is preserved.
          # releaseDraft mirrors the draft input: a final release stays a draft
          # here so the binaries land BEFORE it goes public; an rc stays false.
          releaseId: ${{ inputs.release_id }}
          tagName: ${{ needs.setup.outputs.tag }}
          releaseName: "Mutka ${{ needs.setup.outputs.tag }}"
          releaseDraft: ${{ needs.setup.outputs.draft }}
          prerelease: ${{ needs.setup.outputs.prerelease }}
          args: --target universal-apple-darwin

      # Smoke-test the bundle we just built BEFORE it can go public. This runs on
      # the macOS runner that's already up for the build (so it costs ~1 min, no
      # extra runner) — and it must: the artifact is a Mach-O universal binary, so
      # only macOS can execute it (Linux/Xvfb cannot run it, and cannot build it
      # either — window-vibrancy/objc/keyring/codesign/notarize are macOS-only).
      #
      # `--list-actions` is a real functional smoke test, not just "does it boot":
      # the app must launch the WebView, load EVERY module through the permission
      # gateway, emit app:ready, ask ModuleRegistry for the actions, print them and
      # exit 0. A broken module load, a broken registry, or a launch crash all fail
      # here. If this step fails, the job fails and the "Publish the release" step
      # below never runs — so the release stays a DRAFT and never becomes "Latest".
      - name: Smoke-test the bundle
        run: |
          set -euo pipefail
          APP=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)
          test -n "$APP" || { echo "no .app built"; exit 1; }
          BIN="$APP/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$APP/Contents/Info.plist")"
          echo "Testing $BIN"

          # Structural: universal (both arches) + valid signature + Gatekeeper accepts
          # (the latter proves notarization stapled). These are cheap and catch a
          # mis-signed or single-arch bundle that would fail on users' machines.
          lipo -info "$BIN" | grep -q arm64
          lipo -info "$BIN" | grep -q x86_64
          codesign --verify --deep --strict --verbose=2 "$APP"
          spctl -a -vvv -t install "$APP"

          # Functional: boot the whole app headlessly and dump the action registry.
          # macOS has no Xvfb; the runner's WindowServer session lets the window open.
          # Portable timeout (macOS has no coreutils `timeout`): poll then kill.
          "$BIN" --list-actions > cli-out.txt 2>&1 &
          PID=$!
          for _ in $(seq 60); do kill -0 "$PID" 2>/dev/null || break; sleep 1; done
          if kill -0 "$PID" 2>/dev/null; then
            kill "$PID" 2>/dev/null || true
            echo "::error::--list-actions did not exit within 60s (boot hang?)"
            cat cli-out.txt; exit 1
          fi
          wait "$PID"; RC=$?
          if [ "$RC" -ne 0 ]; then
            echo "::error::--list-actions exited with $RC"
            cat cli-out.txt; exit 1
          fi
          # A core built-in must be present, proving the module pipeline registered.
          grep -q "core.clipboard.copy" cli-out.txt || {
            echo "::error::expected core actions missing — module load likely failed"
            cat cli-out.txt; exit 1
          }
          echo "Smoke test passed:"; cat cli-out.txt

      # Binaries are attached AND smoke-tested — NOW make the release public. Un-drafting is the
      # moment GitHub creates the vX.Y.Z tag and assigns the "Latest" badge, so
      # the release never appears as "Latest" without an installable .dmg. We patch
      # by release id (a draft has no tag to address it by). make_latest=true gives
      # it the "Latest" badge, replacing whichever older release currently holds it.
      # Only the draft (final) path reaches this; rc builds were never drafts.
      - name: Publish the release
        if: needs.setup.outputs.draft == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            "repos/${{ github.repository }}/releases/${{ inputs.release_id }}" \
            -F draft=false -f make_latest=true

  # npm packages publish on FINAL releases only. release-please has already bumped
  # their package.json in lockstep, so they publish at the correct version with no
  # stamping. RC tags skip this.
  publish-sdk:
    needs: setup
    if: needs.setup.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The SHA, not the tag: on the draft path the tag does not exist yet
          # (these jobs run in parallel with build, which publishes it at the end).
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Install SDK build deps
        working-directory: packages/module-sdk
        run: npm install --no-audit --no-fund
      - name: Build types bundle
        working-directory: packages/module-sdk
        run: npm run build
      - name: Publish to npm
        working-directory: packages/module-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  publish-create:
    needs: setup
    if: needs.setup.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # The SHA, not the tag: on the draft path the tag does not exist yet
          # (these jobs run in parallel with build, which publishes it at the end).
          ref: ${{ needs.setup.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        working-directory: packages/create-module
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
