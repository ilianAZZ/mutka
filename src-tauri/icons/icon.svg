<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Squircle background: deep indigo → near-black -->
    <linearGradient id="mbg" x1="48" y1="48" x2="464" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#3B2D7A"/>
      <stop offset="100%" stop-color="#101019"/>
    </linearGradient>

    <!-- The path stroke: the colour "changes" along the bend (violet → blue → cyan) -->
    <linearGradient id="mstroke" x1="48" y1="464" x2="464" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7C5CFF"/>
      <stop offset="50%"  stop-color="#4F8CFF"/>
      <stop offset="100%" stop-color="#2FD9D0"/>
    </linearGradient>

    <!-- Liquid-glass specular highlight, top-down -->
    <linearGradient id="mspec" x1="256" y1="48" x2="256" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Squircle -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#mbg)"/>
  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#mspec)"/>

  <!-- The bend: a single fluid stroke that serpentines into an "M" — a road that turns -->
  <path d="M160 360
           L160 216
           Q160 168 208 168
           Q256 168 256 216
           L256 304
           Q256 360 304 360
           Q352 360 352 296
           L352 152"
        fill="none" stroke="url(#mstroke)" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
